<svg xmlns="http://www.w3.org/2000/svg" width="220" height="380" viewBox="0 0 220 380" role="img" aria-labelledby="title desc">
  <title id="title">Divine Shiva Hero</title>
  <desc id="desc">A stylized devotional hero illustration with a glowing Om and temple-inspired gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14233a"/>
      <stop offset="48%" stop-color="#233b5c"/>
      <stop offset="100%" stop-color="#0f1a2d"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="26%" r="45%">
      <stop offset="0%" stop-color="#f5d18a" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#d79048" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#d79048" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#89a7c7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#577a9d" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cde5ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#cde5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="220" height="380" rx="16" fill="url(#bg)"/>
  <ellipse cx="110" cy="98" rx="88" ry="80" fill="url(#halo)"/>

  <path d="M20 286 L70 212 L110 276 L156 206 L205 286 Z" fill="url(#mountain)"/>
  <path d="M0 280 C35 262 72 272 110 264 C148 255 180 269 220 257 L220 380 L0 380 Z" fill="#0b1424" opacity="0.82"/>
  <path d="M0 248 C36 233 66 239 108 229 C148 219 182 229 220 216 L220 380 L0 380 Z" fill="#1a2b44" opacity="0.6"/>

  <g opacity="0.9">
    <circle cx="108" cy="140" r="1.5" fill="#b6ddff"/>
    <circle cx="96" cy="156" r="1.3" fill="#b6ddff"/>
    <circle cx="120" cy="162" r="1.4" fill="#b6ddff"/>
    <circle cx="112" cy="176" r="1.2" fill="#b6ddff"/>
  </g>

  <text x="110" y="126" fill="#f7d391" text-anchor="middle" font-family="'Noto Serif Devanagari', serif" font-size="74">ॐ</text>

  <ellipse cx="110" cy="252" rx="108" ry="84" fill="url(#mist)"/>
