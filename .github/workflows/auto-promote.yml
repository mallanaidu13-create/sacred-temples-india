name: Auto-promote supabase-integration to main

on:
  push:
    branches:
      - supabase-integration

jobs:
  merge:
    name: Merge supabase-integration into main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and merge supabase-integration
        run: |
          git fetch origin supabase-integration
          git merge --no-edit origin/supabase-integration

      - name: Push to main
        run: git push origin main
